name: CI

# Se ejecuta en cada push a cualquier rama y en cada Pull Request.
on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Compilar y probar
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar el SDK de .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependencias
        run: dotnet restore OverLoad.Tests/OverLoad.Tests.csproj

      - name: Compilar (Release)
        run: dotnet build OverLoad.Tests/OverLoad.Tests.csproj --configuration Release --no-restore

      - name: Ejecutar pruebas (xUnit)
        run: dotnet test OverLoad.Tests/OverLoad.Tests.csproj --configuration Release --no-build --verbosity normal
